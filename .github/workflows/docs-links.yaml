---
name: Docs (Link Check)

on: # yamllint disable-line rule:truthy
  schedule:
    # Weekly, Monday 06:00 UTC. External links rot on their own
    # schedule, so this runs on a timer instead of blocking deploys.
    - cron: 0 6 * * 1
  workflow_dispatch:

concurrency:
  group: docs-linkcheck
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  linkcheck:
    name: Build docs and check all links
    if: github.repository_owner == 'tinydantic'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Build docs and run linkchecker
        run: uv run --group docs poe docs-build-check
