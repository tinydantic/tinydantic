---
name: Docs (Release)

on: # yamllint disable-line rule:truthy
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

concurrency:
  group: docs-deploy

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  build-and-publish:
    name: Build and Publish Docs
    if: github.repository_owner == 'tinydantic'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # https://github.com/actions/checkout/issues/249
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Configure Git for GitHub Actions bot
        # yamllint disable rule:line-length
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
        # yamllint enable rule:line-length
      - name: Build documentation
        run: uv run --group docs poe docs-build
      - name: Get doc version
        run: |
          TAG_NAME=${{ github.ref_name }}
          DOC_VERSION=${TAG_NAME#v}
          echo "Documentation version: $DOC_VERSION"
          echo "DOC_VERSION=$DOC_VERSION" >> $GITHUB_ENV
      - name: Commit documentation
        run: >-
          uv run --group docs poe docs-ci-publish "$DOC_VERSION" latest
      - name: Create archive
        run: git archive -o site.zip gh-pages
      - uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: site.zip
