# Release pipeline. All side-effect-free gate jobs (version-guard,
# build, build-docs) must succeed before anything deploys. PyPI
# publishing runs first among the deploy jobs because it is the only
# irreversible step (a version's files can never be re-uploaded);
# deploy-docs and github-release are idempotent, so a failure after
# the PyPI publish is recovered by re-running the failed jobs.
name: Release

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions:
  attestations: write
  contents: read
  id-token: write

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  version-guard:
    name: Verify tag matches pyproject version
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Check tag matches pyproject version
        # yamllint disable rule:line-length
        run: |
          PYPROJECT_VERSION="v$(uv version --short --color never)"
          if [ "$PYPROJECT_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} != pyproject version ${PYPROJECT_VERSION}" >&2
            exit 1
          fi
        # yamllint enable rule:line-length

  build:
    name: Build & verify package dists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18.0
        with:
          attest-build-provenance-github: "true"

  build-docs:
    name: Build docs (release gate)
    if: >-
      github.repository_owner == 'tinydantic'
      && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # https://github.com/actions/checkout/issues/249
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Build documentation
        run: uv run --group docs poe docs-build

  publish-to-pypi:
    name: Publish to PyPI
    # only publish to PyPI on tag pushes
    if: >-
      github.repository_owner == 'tinydantic'
      && startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - build-docs
      - version-guard
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tinydantic
    steps:
      - name: Download package dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: dist
      - name: Publish dists to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  deploy-docs:
    name: Deploy versioned docs
    if: >-
      github.repository_owner == 'tinydantic'
      && startsWith(github.ref, 'refs/tags/')
    needs:
      - publish-to-pypi
    concurrency:
      group: docs-deploy
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # https://github.com/actions/checkout/issues/249
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Configure Git for GitHub Actions bot
        # yamllint disable rule:line-length
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
        # yamllint enable rule:line-length
      - name: Build documentation
        run: uv run --group docs poe docs-build
      - name: Get doc version
        run: |
          TAG_NAME=${{ github.ref_name }}
          DOC_VERSION=${TAG_NAME#v}
          echo "Documentation version: $DOC_VERSION"
          echo "DOC_VERSION=$DOC_VERSION" >> $GITHUB_ENV
      - name: Commit documentation
        run: >-
          uv run --group docs poe docs-ci-publish "$DOC_VERSION" latest
      - name: Create archive
        run: git archive -o site.zip gh-pages
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation
          path: site.zip

  github-release:
    name: Create GitHub Release
    if: >-
      github.repository_owner == 'tinydantic'
      && startsWith(github.ref, 'refs/tags/')
    needs:
      - publish-to-pypi
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download package dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: dist
      - name: Get release version
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          echo Version: $VERSION
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Get repository name
        run: |
          REPO_NAME=$(basename ${{ github.repository }})
          echo "Repository name: $REPO_NAME"
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # Skip creation if the release already exists so that
        # re-running this job after a partial failure converges
        # instead of failing on the duplicate.
        run: >-
          gh release view
          '${{ github.ref_name }}'
          --repo '${{ github.repository }}'
          || gh release create
          '${{ github.ref_name }}'
          --repo '${{ github.repository }}'
          --title "$REPO_NAME $VERSION"
          --notes ""
      - name: Upload package dists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # Upload to GitHub Release using the `gh` CLI. `dist/` contains
        # the built packages. `--clobber` keeps re-runs idempotent when
        # some assets were already uploaded.
        run: >-
          gh release upload
          '${{ github.ref_name }}' dist/**
          --repo '${{ github.repository }}'
          --clobber
