default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-docstring-first
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-yaml
        args:
          # TODO @cdwilson: without `--unsafe`, this check fails with `could not
          # determine a constructor for the tag
          # 'tag:yaml.org,2002:python/name:materialx.emoji.twemoji'`
          - --unsafe
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-aws-credentials
        args:
          - --allow-missing-credentials
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: name-tests-test
        args:
          - --pytest-test-first
        exclude: tests/model/models.py
      - id: trailing-whitespace
        args:
          - --markdown-linebreak-ext=md
  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        alias: ec
        exclude: LICENSES
  - repo: https://github.com/pre-commit-ci/pre-commit-ci-config
    rev: v1.6.1
    hooks:
      - id: check-pre-commit-ci-config
  - repo: https://github.com/henryiii/validate-pyproject-schema-store
    rev: 2026.07.06
    hooks:
      - id: validate-pyproject
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-github-workflows
        args:
          - --builtin-schema=vendor.github-workflows
  # --offline avoids downloading schemas at runtime (pre-commit.ci
  # doesn't allow network access for free tier) and keeps formatting
  # and linting deterministic across environments.
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v1.2.0
    hooks:
      - id: tombi-format
        args:
          - --offline
      - id: tombi-lint
        args:
          - --offline
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      - id: commitizen
      - id: commitizen-branch
        stages:
          - pre-push
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
  # https://github.com/pre-commit/mirrors-prettier was archived Apr 11, 2024
  # See also https://github.com/prettier/prettier/issues/15742
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.9.4
    hooks:
      - id: prettier
        stages:
          # Prevents "[error] No matching files. Patterns: .git/COMMIT_EDITMSG"
          - pre-commit
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - --strict
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v10.0.1
    hooks:
      - id: cspell
        exclude: LICENSES
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
