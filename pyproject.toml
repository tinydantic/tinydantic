#:schema https://json.schemastore.org/pyproject.json

[build-system]
build-backend = "uv_build"
requires = [
  "uv_build>=0.11,<0.12",
]

[project]
authors = [
  { name = "Chris Wilson", email = "christopher.david.wilson@gmail.com" },
]
# https://pypi.org/classifiers/
classifiers = [
  "Development Status :: 3 - Alpha",
  "Framework :: Pydantic :: 2",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python",
  "Topic :: Database",
  "Topic :: Software Development :: Libraries",
  "Typing :: Typed",
]
dependencies = [
  "PyYAML>=6.0",
  "pydantic[email]>=2.11",
  "tinydb>=4.8",
]
description = "A Pydantic-powered ODM (object-document mapper) for TinyDB"
keywords = [
  "odm",
  "pydantic",
  "tinydb",
]
license = "Apache-2.0 OR MIT"
license-files = [
  "LICENSES/*",
]
name = "tinydantic"
readme = "README.md"
requires-python = ">=3.11"
version = "0.1.19"

[project.urls]
Changelog = "https://github.com/tinydantic/tinydantic/blob/main/CHANGELOG.md"
Documentation = "https://tinydantic.dev"
Issues = "https://github.com/tinydantic/tinydantic/issues"
Source = "https://github.com/tinydantic/tinydantic"

[dependency-groups]
dev = [
  "check-jsonschema",
  "commitizen",
  "editorconfig-checker",
  "interrogate",
  "jsonschema[format]",
  "poethepoet",
  "pre-commit",
  "pre-commit-ci-config",
  "pyclean",
  "reuse>=5.0.0",
  { include-group = "docs" },
  { include-group = "lint" },
  { include-group = "test" },
  { include-group = "types" },
]
docs = [
  # black is used by separate_signature option in mkdocstrings-python
  "black",
  "griffe",
  "linkchecker",
  "markdown-callouts",
  "markdown-gfm-admonition",
  "mdx_truly_sane_lists",
  "mike",
  "mkdocs-awesome-pages-plugin",
  "mkdocs-gen-files",
  "mkdocs-github-admonitions-plugin",
  "mkdocs-include-markdown-plugin",
  "mkdocs-material",
  "mkdocstrings",
  "mkdocstrings-python",
  "poethepoet",
]
lint = [
  "poethepoet",
  "ruff>=0.14",
]
test = [
  "packaging",
  "poethepoet",
  "pytest-cov",
  "pytest-randomly",
  "pytest-rerunfailures",
  "pytest-xdist",
  "pytest>=8",
]
types = [
  "mypy>=1.14",
  "packaging",
  "types-PyYAML",
]

[tool.coverage.run]
branch = true
parallel = true
source_pkgs = [
  "tests",
  "tinydantic",
]

[tool.coverage.paths]
tests = [
  "*/tinydantic/tests",
  "tests",
]
tinydantic = [
  "*/tinydantic/src/tinydantic",
  "src/tinydantic",
]

[tool.coverage.report]
exclude_lines = [
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
  "no cov",
]

[tool.commitizen]
major_version_zero = true
name = "cz_conventional_commits"
tag_format = "v$version"
version_provider = "pep621"
version_scheme = "semver2"

[tool.interrogate]
fail-under = 100
ignore-private = true
ignore-regex = [
  "DocumentMeta",
]
ignore-semiprivate = true
omit-covered-files = true
style = "google"
verbose = 2

[tool.pytest.ini_options]
addopts = "--doctest-modules --doctest-glob '*.md'"
doctest_optionflags = "NORMALIZE_WHITESPACE IGNORE_EXCEPTION_DETAIL"
minversion = "6.0"
testpaths = [
  "CONTRIBUTING.md",
  "README.md",
  "docs",
  "src",
  "tests",
]
