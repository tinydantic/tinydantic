# https://tombi-toml.github.io/tombi/docs/configuration

[files]
# uv.lock is generated by uv in its own canonical style; reformatting
# it would make every `uv lock` run churn the file.
exclude = [
  "uv.lock",
]

[schema]
# The Schema Store schema for poe tasks (pyproject.toml#tool.poe) is
# incomplete: strict mode rejects valid keys like `ref` in sequence
# items, so additional keys are allowed everywhere.
strict = false
